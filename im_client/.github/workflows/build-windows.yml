name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install aqtinstall
        run: |
          pip install aqtinstall

      - name: Install Qt
        shell: bash
        run: |
          pip install certifi
          export PYTHONHTTPSVERIFY=0
          python -m aqt install-qt windows desktop 6.5.3 win64_mingw -O C:/Qt -k || true
          ls -la C:/Qt/6.5.3/ || echo "Qt not installed"

      - name: Configure
        shell: bash
        if: always()
        run: |
          cd im_client
          rm -rf build
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="C:/Qt/6.5.3/mingw64"

      - name: Build
        shell: bash
        if: always()
        run: |
          cd im_client/build
          cmake --build . --config Release -- -j4 || echo "Build failed"

      - name: Package
        shell: bash
        if: always()
        run: |
          cd im_client/build
          if [ -d "Release" ]; then
            cd Release
          fi
          mkdir -p package/platforms 2>/dev/null || true
          cp im_client.exe package/ 2>/dev/null || true
          cp C:/Qt/6.5.3/mingw64/bin/*.dll package/ 2>/dev/null || true
          cp C:/Qt/6.5.3/mingw64/plugins/platforms/*.dll package/platforms/ 2>/dev/null || true
          powershell Compress-Archive -Path package -DestinationPath im_client-Windows.zip -Force 2>/dev/null || echo "Package failed"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: im_client-windows
          path: im_client/build/Release/im_client-Windows.zip
