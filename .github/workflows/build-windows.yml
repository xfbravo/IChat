name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install aqtinstall
        run: |
          pip install aqtinstall

      - name: Install Qt
        run: |
          aqt install-qt windows desktop 6.7.0 win64_mingw -O C:/Qt

      - name: Configure
        run: |
          cd im_client
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/6.7.0/mingw64"

      - name: Build
        run: |
          cd im_client/build
          cmake --build . --config Release -- -j4

      - name: Package
        run: |
          cd im_client/build/Release
          mkdir -p package/platforms
          cp im_client.exe package/
          cp C:/Qt/6.7.0/mingw64/bin/*.dll package/ 2>/dev/null || true
          cp C:/Qt/6.7.0/mingw64/plugins/platforms/*.dll package/platforms/ 2>/dev/null || true
          powershell Compress-Archive -Path package -DestinationPath im_client-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: im_client-windows
          path: im_client/build/Release/im_client-Windows.zip
