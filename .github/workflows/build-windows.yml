name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Qt
        run: |
          curl -L -o qt.7z https://github.com/miurahr7/qt5-MingW-w64/releases/download/v1.0.4/qt-5.15.2-mingw72-x64.7z

      - name: Extract Qt
        run: |
          7z x qt.7z -o"$env:USERPROFILE\Qt5" -y
          del qt.7z

      - name: Set up Qt
        run: |
          echo "$env:USERPROFILE\Qt5\qt5-15.2-mingw72-x64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config Release -- -j4

      - name: Package
        shell: bash
        run: |
          cd build/Release
          mkdir -p im_client/platforms
          cp im_client.exe im_client/
          cp "$USERPROFILE/Qt5/qt5-15.2-mingw72-x64/mingw64/bin/"*.dll im_client/ 2>/dev/null || true
          cp "$USERPROFILE/Qt5/qt5-15.2-mingw72-x64/mingw64/plugins/platforms/"*.dll im_client/platforms/ 2>/dev/null || true
          powershell Compress-Archive -Path im_client -DestinationPath im_client-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: im_client-windows
          path: build/Release/im_client-Windows.zip
