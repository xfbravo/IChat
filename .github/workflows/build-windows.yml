name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install aqtinstall
        run: |
          pip install aqtinstall

      - name: Install Qt
        run: |
          aqt install-qt windows desktop 6.7.0 win64_mingw -O Qt6

      - name: Set up Qt
        run: |
          Add-Content -FilePath $env:GITHUB_PATH -Value "$(Get-Location)\Qt6\6.7.0\mingw64\bin"

      - name: Configure
        shell: bash
        run: |
          cd im_client
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(pwd)/../../../Qt6/6.7.0/mingw64"

      - name: Build
        shell: bash
        run: |
          cd im_client/build
          cmake --build . --config Release -- -j4

      - name: Package
        shell: bash
        run: |
          cd im_client/build/Release
          mkdir -p im_client/package
          cp im_client.exe im_client/package/
          cp "$(pwd)/../../../../Qt6/6.7.0/mingw64/bin/"*.dll im_client/package/ 2>/dev/null || true
          cp -r "$(pwd)/../../../../Qt6/6.7.0/mingw64/plugins/platforms/"*.dll im_client/package/platforms/ 2>/dev/null || true
          mkdir -p im_client/package/platforms
          powershell Compress-Archive -Path im_client/package -DestinationPath im_client-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: im_client-windows
          path: im_client/build/Release/im_client-Windows.zip
